server {
    listen 80;
    server_name www.distribuidos.net;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;
    gzip_proxied any;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ =404;
        autoindex off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    location ~ ^/editorial { 
        proxy_pass http://127.0.0.1:8081;
    }

    location ~ ^/autor { 
        proxy_pass http://127.0.0.1:8082; 
    }

    location ~ ^/libro { 
        proxy_pass http://127.0.0.1:8083; 
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

server {
    listen 80;
    server_name servicios.distribuidos.net;

    server_tokens off;

    default_type application/json;

    gzip on;
    gzip_types text/plain application/json;
    gzip_proxied any;
    gzip_min_length 1000;

    location ~ ^/libro {
        proxy_pass http://127.0.0.1:8083;
        proxy_intercept_errors off; #ya lo hice en flask
    }

    location / {
        return 403 '{"error": "403 Forbidden", "mensaje": "Acceso denegado"}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        return 502 '{"error": "502 Bad Gateway", "mensaje": "No responde"}';
    }

    error_page 404 /404.json;
    location = /404.json {
        return 404 '{"error": "404 Not Found", "mensaje": "No registrado"}';
    }
}