upstream upstream_editorial {
    server 10.0.2.20:8081 weight=1;
    server 10.0.2.10:8081 weight=2;
}

upstream upstream_autor {
    server 10.0.2.20:8082 weight=1;
    server 10.0.2.10:8082 weight=2;
}

upstream upstream_libro {
    server 10.0.2.20:8083 weight=1;
    server 10.0.2.10:8083 weight=2;
}

upstream upstream_nginx_web {
    server 10.0.2.20:80 weight=1;
    server 10.0.2.10:80 weight=2;
}

server {
    listen 443 ssl;
    server_name www.distribuidos.net;

    ssl_certificate /etc/nginx/ssl/distribuidos.crt;
    ssl_certificate_key /etc/nginx/ssl/distribuidos.key;
    
    location / {
        proxy_pass http://upstream_nginx_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/editorial {
        proxy_pass http://upstream_editorial;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/autor {
        proxy_pass http://upstream_autor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/libro {
        proxy_pass http://upstream_libro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server { #esto me faltaba!! enlace http a https
    listen 80;
    server_name www.distribuidos.net servicios.distribuidos.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name servicios.distribuidos.net;

    ssl_certificate /etc/nginx/ssl/distribuidos.crt;
    ssl_certificate_key /etc/nginx/ssl/distribuidos.key;


    location ~ ^/libro {
        proxy_pass http://upstream_libro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}